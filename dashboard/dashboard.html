<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Report Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════
   THEME VARIABLES
   ═══════════════════════════════════════════════════════════════════════ */
[data-theme="light"] {
  --logo-from: #1d4ed8;
  --logo-to: #6d28d9;
  --bg: #f7f5f2;
  --bg2: #edeae5;
  --surface: #ffffff;
  --surface2: #f5f3ef;
  --surface3: #edeae5;
  --border: #e2ded8;
  --border2: #d4cfc7;
  --border3: #c5bfb5;
  --accent: #1d4ed8;
  --accent-hover: #1e40af;
  --accent-soft: rgba(29,78,216,.08);
  --accent-glow: rgba(29,78,216,.18);
  --text: #171715;
  --text2: #595651;
  --text3: #9c9890;
  --text4: #b8b4ab;
  --success: #166534;
  --success-bg: rgba(22,101,52,.08);
  --warn: #b45309;
  --warn-bg: rgba(180,83,9,.08);
  --err: #b91c1c;
  --err-bg: rgba(185,28,28,.07);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.08);
  --nav-bg: rgba(255,255,255,.85);
  --nav-border: rgba(0,0,0,.06);
  --table-head-bg: #f2f0eb;
  --table-row-hover: rgba(29,78,216,.03);
  --table-stripe: rgba(0,0,0,.015);
  --input-bg: #f5f3ef;
  --input-border: #d4cfc7;
  --input-focus-bg: #ffffff;
  --drawer-bg: #ffffff;
  --code-bg: #f2f0eb;
  --r: 8px;
}

[data-theme="dark"] {
  --logo-from: #60a5fa;
  --logo-to: #a78bfa;
  --bg: #0d0d0d;
  --bg2: #161616;
  --surface: #1a1a1a;
  --surface2: #212121;
  --surface3: #282828;
  --border: #2a2a2a;
  --border2: #383838;
  --border3: #484848;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-soft: rgba(59,130,246,.1);
  --accent-glow: rgba(59,130,246,.2);
  --text: #edebe8;
  --text2: #9c9994;
  --text3: #5c5a56;
  --text4: #3e3c39;
  --success: #22c55e;
  --success-bg: rgba(34,197,94,.08);
  --warn: #f59e0b;
  --warn-bg: rgba(245,158,11,.08);
  --err: #ef4444;
  --err-bg: rgba(239,68,68,.07);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
  --nav-bg: rgba(13,13,13,.88);
  --nav-border: rgba(255,255,255,.06);
  --table-head-bg: #1c1c1c;
  --table-row-hover: rgba(59,130,246,.05);
  --table-stripe: rgba(255,255,255,.015);
  --input-bg: #212121;
  --input-border: #383838;
  --input-focus-bg: #282828;
  --drawer-bg: #1a1a1a;
  --code-bg: #1c1c1c;
  --r: 8px;
}

/* ═══════════════════════════════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: "DM Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14.5px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  line-height: 1.55;
  transition: background .25s ease, color .25s ease;
}

/* ═══════════════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════════════ */
.nav {
  flex-shrink: 0;
  background: var(--nav-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--nav-border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 50px;
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background .25s ease, border-color .25s ease;
}

.nav-logo {
  font-family: "DM Sans", sans-serif;
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 2.5px;
  color: var(--text);
  margin-right: 24px;
  white-space: nowrap;
}
.nav-logo-label { color: var(--text); }
.nav-logo-accent {
  background: linear-gradient(135deg, var(--logo-from), var(--logo-to));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-tabs {
  display: flex;
  align-items: stretch;
  margin-right: auto;
  gap: 1px;
}

.nav-tab {
  background: transparent;
  border: none;
  padding: 0 14px;
  height: 50px;
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
  letter-spacing: .3px;
}
.nav-tab:hover { color: var(--text2); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.nav-period-type {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-right: 8px;
  flex-shrink: 0;
  background: var(--surface2);
  border-radius: 7px;
  padding: 2px;
  border: 1px solid var(--border);
}
.nav-pt-btn {
  background: transparent;
  border: none;
  border-radius: 5px;
  padding: 4px 10px;
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: .2px;
}
.nav-pt-btn:hover { color: var(--text2); }
.nav-pt-btn.active {
  color: var(--accent);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Theme Toggle */
.theme-toggle {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 7px;
  width: 30px;
  height: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  color: var(--text3);
  transition: all .15s;
  flex-shrink: 0;
}
.theme-toggle:hover { color: var(--text); border-color: var(--accent); background: var(--accent-soft); }

/* Week Dropdown */
.wk-drop { position: relative; display: inline-block; }
.wk-btn {
  background: var(--accent-soft);
  border: 1px solid rgba(59,130,246,.35);
  border-radius: 7px;
  padding: 6px 26px 6px 10px;
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  position: relative;
  transition: border-color .15s, box-shadow .15s;
}
.wk-btn::after {
  content: '▾';
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  color: var(--text3);
  transition: transform .2s;
}
.wk-drop.open .wk-btn::after { transform: translateY(-50%) rotate(180deg); }
.wk-btn:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.wk-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 9px;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
  transition: opacity .18s, transform .18s cubic-bezier(.34,1.56,.64,1);
}
.wk-drop.open .wk-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
.wk-item {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: background .12s, color .12s;
}
.wk-item:hover { background: var(--accent-soft); color: var(--text); }
.wk-item.active { color: var(--accent); font-weight: 600; background: var(--accent-soft); }

/* Buttons */
.btn {
  border: none;
  border-radius: 7px;
  padding: 6px 12px;
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .2px;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 0 0 4px var(--accent-glow); }
.btn-ghost {
  background: var(--accent-soft);
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--accent); background: var(--accent-soft); }
.btn-ghost.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

/* ═══════════════════════════════════════════════════════════════════════
   STATS ROW
   ═══════════════════════════════════════════════════════════════════════ */
.stats-row {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  margin: 16px 16px 0;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px 16px;
  box-shadow: var(--shadow-sm);
  transition: background .25s ease, border-color .25s ease, box-shadow .25s ease;
}
.stat-val {
  font-family: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -1px;
  line-height: 1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.stat-lbl {
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 12px;
  color: var(--text2);
  margin-top: 8px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  letter-spacing: .1px;
}
.stat-delta {
  font-size: 11px;
  font-weight: 600;
  font-family: "JetBrains Mono", "SF Mono", monospace;
}
.up { color: var(--success); }
.down { color: var(--err); }
.flat { color: var(--text3); }

/* ═══════════════════════════════════════════════════════════════════════
   AI STRIP
   ═══════════════════════════════════════════════════════════════════════ */
.ai-strip {
  flex-shrink: 0;
  margin: 10px 16px 0;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  min-height: 40px;
  box-shadow: var(--shadow-sm);
  transition: background .25s ease, border-color .25s ease;
}
.ai-strip-icon {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  margin-top: 1px;
}
.ai-strip-label {
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .3px;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.ai-strip-text {
  font-size: 13.5px;
  color: var(--text2);
  line-height: 1.6;
  flex: 1;
}

/* ═══════════════════════════════════════════════════════════════════════
   ERROR BAR
   ═══════════════════════════════════════════════════════════════════════ */
.err {
  flex-shrink: 0;
  background: var(--err-bg);
  border-bottom: 1px solid rgba(185,28,28,.2);
  padding: 8px 20px;
  font-size: 12px;
  color: var(--err);
  display: none;
  font-weight: 500;
}
.err.on { display: block; }

/* ═══════════════════════════════════════════════════════════════════════
   TABLE
   ═══════════════════════════════════════════════════════════════════════ */
.table-shell {
  flex: 1;
  overflow: hidden;
  margin: 10px 16px 16px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  min-height: 0;
  box-shadow: var(--shadow-sm);
  transition: background .25s ease, border-color .25s ease;
}

.table-toolbar {
  flex-shrink: 0;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border-radius: var(--r) var(--r) 0 0;
  transition: background .25s ease, border-color .25s ease;
}
.search {
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 6px;
  padding: 6px 12px;
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 12px;
  color: var(--text);
  width: 200px;
  transition: border-color .15s, background .15s, box-shadow .15s;
}
.search:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--input-focus-bg);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search::placeholder { color: var(--text3); }
.tbl-meta {
  margin-left: auto;
  font-size: 12px;
  color: var(--text3);
  font-family: "JetBrains Mono", "SF Mono", monospace;
}
.tbl-hint {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}
.hint-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.tbl-scroll { flex: 1; overflow: auto; }

table { width: 100%; border-collapse: collapse; }

thead { position: sticky; top: 0; z-index: 5; }

thead tr {
  background: var(--table-head-bg);
  border-bottom: 1px solid var(--border);
  transition: background .25s ease;
}

th {
  padding: 9px 14px;
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--text3);
  text-align: right;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: color .15s;
}
th:first-child { text-align: left; }
th:hover { color: var(--text2); }
th.sorted { color: var(--accent); }

td {
  padding: 10px 14px;
  font-size: 13.5px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-variant-numeric: tabular-nums;
  transition: background .12s, border-color .25s ease;
}
td:first-child { text-align: left; font-weight: 500; }
tr:last-child td { border-bottom: none; }

tr.rpt { cursor: pointer; transition: background .12s; }
tr.rpt:hover td { background: var(--table-row-hover); }
tr.rpt:hover td:first-child { color: var(--accent); }
tr.nrpt td { color: var(--text3); }
tr.nrpt td:first-child { color: var(--text2); border-left: 2px solid var(--warn); padding-left: 12px; }

tr.rpt:nth-child(even) td { background: var(--table-stripe); }
tr.rpt:hover td { background: var(--table-row-hover); }

.rank-num {
  display: inline-block;
  width: 22px;
  text-align: right;
  font-family: "JetBrains Mono", "SF Mono", monospace;
  font-size: 11px;
  color: var(--text3);
  margin-right: 8px;
}
.badge-miss {
  font-size: 10px;
  color: var(--warn);
  background: var(--warn-bg);
  border: 1px solid rgba(245,158,11,.25);
  border-radius: 4px;
  padding: 1px 6px;
  margin-left: 6px;
  font-weight: 600;
}
.click-hint {
  font-size: 10px;
  color: var(--text3);
  margin-left: 6px;
  opacity: 0;
  transition: opacity .15s;
}
tr.rpt:hover .click-hint { opacity: 1; }
.empty { text-align: center; padding: 60px; color: var(--text3); font-weight: 500; }

/* ═══════════════════════════════════════════════════════════════════════
   REPORT DRAWER
   ═══════════════════════════════════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s;
}
.overlay.vis { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(820px, 92vw);
  background: var(--drawer-bg);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 40px rgba(0,0,0,.3);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .26s cubic-bezier(.32,0,.08,1), background .25s ease;
}
.drawer.open { transform: translateX(0); }

.drawer-hd {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  transition: background .25s ease, border-color .25s ease;
}
.drawer-avatar {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "DM Sans", sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: var(--accent);
}
.drawer-info { flex: 1; min-width: 0; }
.drawer-title {
  font-family: "DM Sans", "PingFang SC", sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.drawer-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
  font-weight: 500;
}
.btn-close {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 10px;
  font-size: 15px;
  cursor: pointer;
  color: var(--text2);
  transition: all .15s;
  line-height: 1;
}
.btn-close:hover { background: var(--border); color: var(--text); }

.drawer-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.drawer-loading {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text3);
  font-size: 13px;
  font-weight: 500;
}
.spin {
  width: 28px;
  height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.drawer-frame { flex: 1; border: none; width: 100%; display: none; }

/* ═══════════════════════════════════════════════════════════════════════
   AI CHAT WIDGET
   ═══════════════════════════════════════════════════════════════════════ */
.ai-fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 300;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: var(--accent);
  box-shadow: 0 4px 20px rgba(59,130,246,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #fff;
  transition: transform .2s, box-shadow .2s, border-radius .2s;
}
.ai-fab:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(59,130,246,.55); }
.ai-fab.open { border-radius: 14px; }
.ai-fab-icon { transition: transform .25s; }
.ai-fab.open .ai-fab-icon { transform: rotate(90deg); }
.ai-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  opacity: 0;
}
.ai-badge.on { opacity: 1; animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.6); } 50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); } }

.ai-panel {
  position: fixed;
  bottom: 88px;
  right: 28px;
  z-index: 299;
  width: 520px;
  height: 600px;
  background: var(--surface);

.ai-panel-hd {

.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  flex-shrink: 0;
  background: var(--accent);

  align-items: center;
  justify-content: center;

  color: #fff;

}
.msg.user .msg-avatar { background: var(--surface3); color: var(--text3); font-size: 12px; }
.msg-bubble {

@keyframes blink { 0%,80%,100% { opacity: .2; } 40% { opacity: 1; } }

.ai-summary-card {
  background: var(--accent-soft);

.ai-panel-input {

}
.ai-text-input {

/* ═══════════════════════════════════════════════════════════════════════
   SKELETON / SHIMMER
   ═══════════════════════════════════════════════════════════════════════ */
@keyframes sh { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skel {

  <div class="stat"><div class="skel" style="height:24px;width:80px"></div><div class="skel" style="height:10px;width:50px;margin-top:8px"></div></div>

<script>
const DICT={
  zh:{
    col_member:'成员',col_msg:'对话数',col_lines:'新增行',col_files:'文件数',col_days:'活跃天',col_msgs_day:'日均对话',col_cost:'费用',col_delta:'周变化',
    all:'全部',no_report:'未提交',no_data:'本周暂无数据',
    nav_team:'📊 团队',refresh:'↻ 刷新',theme_toggle:'切换主题',
    ai_weekly_summary:'AI 周报摘要',search_placeholder:'搜索成员…',tbl_hint:'点击成员查看完整报告',
    loading:'加载报告中…',ai_assistant:'AI 数据助手',online:'在线',ai_placeholder:'询问本周数据…',
    just_now:'刚刚',minutes_ago:'分钟前',hours_ago:'小时前',updated_at:'更新于 ',
    generating_summary:'正在生成摘要，请稍候…',generating_summary_short:'正在生成摘要…',
    ai_summary_failed:'AI 摘要请求失败：',network_error:'网络错误',
    period_weekly:'周',period_monthly:'月',period_quarterly:'季',period_annual:'年',
    stat_msgs:'对话数',stat_lines:'新增代码行',stat_coverage:'提交覆盖率',stat_files:'涉及文件',stat_cost:'本周费用',
    people_unit:'人',view_report:'↗ 查看报告',team_report:'团队报告 · ',
    syncing:'同步中',sync_done:'✓ 完成',failed:'失败',refresh_failed:'刷新失败: ',
    msg_count:'条对话',line_count:'行',
    rpt_messages:'对话数',rpt_lines:'代码行',rpt_files:'文件数',rpt_days:'活跃天',rpt_msgs_day:'日均对话',
    rpt_work_on:'工作内容分布',rpt_usage:'使用方式分析',
    rpt_highlights:'亮点成就',rpt_glance:'数据一览',rpt_insights:'AI 代码数据报告',
    rpt_sessions:'会话数',rpt_top:'主要',rpt_activity:'活动',
    weekly_data_summary:'本周数据摘要',can_continue_asking:'可以继续提问 👇',
    error_retry:'[出错了，请重试]',lang_btn:'EN',
  },
  en:{
    col_member:'Member',col_msg:'Messages',col_lines:'Lines',col_files:'Files',col_days:'Active Days',col_msgs_day:'Msgs/Day',col_cost:'Cost',col_delta:'Change',
    all:'All',no_report:'No report',no_data:'No data this week',
    nav_team:'📊 Team',refresh:'↻ Refresh',theme_toggle:'Toggle Theme',
    ai_weekly_summary:'AI Weekly Summary',search_placeholder:'Search members…',tbl_hint:'Click a member to view full report',
    loading:'Loading report…',ai_assistant:'AI Data Assistant',online:'Online',ai_placeholder:"Ask about this week's data…",
    just_now:'just now',minutes_ago:'m ago',hours_ago:'h ago',updated_at:'Updated ',
    generating_summary:'Generating summary…',generating_summary_short:'Generating summary…',
    ai_summary_failed:'AI summary failed: ',network_error:'Network error',
    period_weekly:'W',period_monthly:'M',period_quarterly:'Q',period_annual:'Y',
    stat_msgs:'Messages',stat_lines:'New Lines',stat_coverage:'Coverage',stat_files:'Files',stat_cost:'Weekly Cost',
    people_unit:' people',view_report:'↗ View Report',team_report:'Team Report · ',
    syncing:'Syncing…',sync_done:'✓ Done',failed:'Failed',refresh_failed:'Refresh failed: ',
    msg_count:' msgs',line_count:' lines',
    rpt_messages:'Messages',rpt_lines:'Lines',rpt_files:'Files',rpt_days:'Active Days',rpt_msgs_day:'Msgs/Day',
    rpt_work_on:'What You Work On',rpt_usage:'How You Use Claude Code',
    rpt_highlights:'Impressive Things You Did',rpt_glance:'At a Glance',rpt_insights:'AI Code Insights',
    rpt_sessions:'Sessions',rpt_top:'Top',rpt_activity:'Activity',
    weekly_data_summary:'Weekly Data Summary',can_continue_asking:'Ask follow-up questions 👇',
    error_retry:'[Error, please retry]',lang_btn:'中文',
  },
};
const S={group:null,period:null,periodType:'weekly',lang:'zh',col:'messages',dir:1,q:'',data:null,chatOpen:false,summaryLoaded:false,cachedSummary:null,reportLang:'en'};
const MEM={};
const t=k=>(DICT[S.lang]||DICT.zh)[k]||k;

function setLang(l){
  S.lang=l;
  document.getElementById('btn-lang').textContent=t('lang_btn');
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>el.placeholder=t(el.dataset.i18nPlaceholder));
  document.querySelectorAll('[data-i18n-title]').forEach(el=>el.title=t(el.dataset.i18nTitle));
  if(S.data) render(S.data);
}
function toggleLang(){setLang(S.lang==='zh'?'en':'zh')}

// ── Theme ──────────────────────────────────────────
function getTheme(){
  const saved=localStorage.getItem('dashboard-theme');
  if(saved) return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
}
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('theme-toggle').textContent=theme==='dark'?'☀':'☾';
  localStorage.setItem('dashboard-theme',theme);
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  applyTheme(cur==='dark'?'light':'dark');
}
applyTheme(getTheme());

// ── Data ───────────────────────────────────────────
async function load(){
  const p=new URLSearchParams();
  if(S.group) p.set('group',S.group);
  if(S.period) p.set('period',S.period);
  p.set('period_type',S.periodType);
  try{
    const r=await fetch('/api/data?'+p);
    if(!r.ok) throw new Error('HTTP '+r.status);
    S.data=await r.json();
    S.summaryLoaded=false;
    hideErr();render(S.data);
  }catch(e){showErr(e.message)}
}

function render(d){
  renderTabs(d);renderPeriods(d);renderStats(d);renderTable(d.members);
  if(d.last_updated){
    const diff=Math.floor((Date.now()-new Date(d.last_updated))/1000);
    const rel=diff<60?t('just_now'):diff<3600?Math.floor(diff/60)+t('minutes_ago'):diff<86400?Math.floor(diff/3600)+t('hours_ago'):new Date(d.last_updated).toLocaleDateString(S.lang,{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('tbl-meta').textContent=t('updated_at')+rel;
  }
  renderAiStrip(d);
}

async function renderAiStrip(d){
  const strip=document.getElementById('ai-strip');
  const txt=document.getElementById('ai-strip-text');
  strip.style.display='flex';
  txt.textContent=t('generating_summary');
  S.summaryLoaded=false;
  try{
    const r=await fetch('/api/ai/summary',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({group:S.group||'',week:d.current_week||'',lang:S.lang}),
    });
    const j=await r.json();
    if(j.error){
      txt.textContent=j.error;
    }else{
      S.cachedSummary=j.summary.replace(/^#+\s*/,'');
      S.summaryLoaded=true;
      txt.textContent=S.cachedSummary;
      if(!S.chatOpen) document.getElementById('ai-badge').classList.add('on');
    }
  }catch(e){
    txt.textContent=t('ai_summary_failed') + (e&&e.message||t('network_error'));
  }
}

function renderTabs(d){
  document.getElementById('nav-tabs').innerHTML=['all',...(d.groups||[])].map(g=>
    `<button class="nav-tab${(S.group||'all')===g?' active':''}" onclick="switchGroup('${g}')">${g==='all'?t('all'):g.toUpperCase()}</button>`
  ).join('');
  var types=d.period_types||['weekly'];
  var labels={weekly:t('period_weekly'),monthly:t('period_monthly'),quarterly:t('period_quarterly'),annual:t('period_annual')};
  document.getElementById('nav-period-type').innerHTML=types.map(function(t){
    return '<button class="nav-pt-btn'+(S.periodType===t?' active':'')+'" onclick="switchPeriodType(\''+t+'\')">'+(labels[t]||t)+'</button>';
  }).join('');
  document.getElementById('btn-team').style.display=d.has_team_report?'inline-block':'none';
}

function renderPeriods(d){
  var cur=d.current_period||'';
  document.getElementById('wk-btn').textContent=cur||'—';
  document.getElementById('wk-menu').innerHTML=[...(d.periods||[])].reverse().map(function(p){
    return '<div class="wk-item'+(p===cur?' active':'')+'" onclick="pickPeriod(\''+p+'\')">'+p+'</div>';
  }).join('');
}
function toggleWeekDrop(){
  document.getElementById('wk-drop').classList.toggle('open');
}
function pickPeriod(p){
  document.getElementById('wk-drop').classList.remove('open');
  S.period=p;load();
}
document.addEventListener('click',e=>{
  const drop=document.getElementById('wk-drop');
  if(drop&&!drop.contains(e.target)) drop.classList.remove('open');
});

function renderStats(d){
  const T=d.totals||{};
  const cpct=T.coverage_pct||0;
  const ccol=cpct>=80?'var(--success)':cpct>=50?'var(--warn)':'var(--err)';
  function pctSpan(delta,current){
    if(delta==null) return '';
    const prev=current-delta;
    if(!prev) return '';
    const p=Math.round(delta/prev*100);
    return p>0?`<span class="stat-delta up">↑ ${p}%</span>`
          :p<0?`<span class="stat-delta down">↓ ${Math.abs(p)}%</span>`
          :'';
  }
  const costVal=T.cost>0?`$${T.cost.toFixed(1)}`:null;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-val">${(T.messages||0).toLocaleString()}</div><div class="stat-lbl">${t('stat_msgs')} ${pctSpan(T.delta_messages,T.messages)}</div></div>
    <div class="stat"><div class="stat-val">${(T.lines_added||0).toLocaleString()}</div><div class="stat-lbl">${t('stat_lines')} ${pctSpan(T.delta_lines_added,T.lines_added)}</div></div>
    <div class="stat"><div class="stat-val" style="color:${ccol}">${cpct}%</div><div class="stat-lbl">${t('stat_coverage')} <span style="color:var(--text3);font-weight:400">${T.reported||0}/${T.expected||0}${t('people_unit')}</span></div></div>
    <div class="stat"><div class="stat-val">${(T.files||0).toLocaleString()}</div><div class="stat-lbl">${t('stat_files')} ${pctSpan(T.delta_files,T.files)}</div></div>
    ${costVal!=null?`<div class="stat"><div class="stat-val">${costVal}</div><div class="stat-lbl">${t('stat_cost')}</div></div>`:''}`;
}

// ── Table ──────────────────────────────────────────
function renderTable(members){
  if(!members) return;
  members.forEach(m=>MEM[m.name]=m);
  const q=S.q.toLowerCase();
  let rows=q?members.filter(m=>m.display.toLowerCase().includes(q)||m.name.toLowerCase().includes(q)):members;
  const rpt=[...rows.filter(m=>m.reported)];
  const nrpt=[...rows.filter(m=>!m.reported)];
  const{col,dir}=S;
  rpt.sort((a,b)=>{const av=a[col]??-Infinity,bv=b[col]??-Infinity;return typeof av==='string'?dir*av.localeCompare(bv):dir*(bv-av)});
  nrpt.sort((a,b)=>a.display.localeCompare(b.display));
  rows=[...rpt,...nrpt];
  document.querySelectorAll('[id^="si-"]').forEach(el=>el.textContent='');
  document.querySelectorAll('th').forEach(el=>el.classList.remove('sorted'));
  const si=document.getElementById('si-'+col),th=document.getElementById('th-'+col);
  if(si) si.textContent=dir===1?' ▼':' ▲';
  if(th) th.classList.add('sorted');
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="7" class="empty">${t('no_data')}</td></tr>`;return}
  let rank=0;
  tbody.innerHTML=rows.map(m=>{
    rank++;
    const d=m.delta_messages;
    const dHtml=!m.reported
      ?'—'
      :d==null?'—':d>0?`<span class="up">+${d.toLocaleString()}</span>`:d<0?`<span class="down">${d.toLocaleString()}</span>`:'—';
    const rowAttr=m.reported?`class="rpt" data-name="${m.name}" onclick="rowClick(this)"` :`class="nrpt"`;
    const rankSpan=`<span class="rank-num" style="${m.reported?'':'color:var(--text3);opacity:.5'}">${rank}</span>`;
    const nameCell=m.reported
      ?`${rankSpan}${m.display}<span class="click-hint">${t('view_report')}</span>`
      :`${rankSpan}${m.display}<span class="badge-miss">${t('no_report')}</span>`;
    const msgsDay=Number(m.msgs_day||0).toLocaleString(undefined,{maximumFractionDigits:1});
    return `<tr ${rowAttr}><td>${nameCell}</td><td>${m.reported?m.messages.toLocaleString():'—'}</td><td>${m.reported?m.lines_added.toLocaleString():'—'}</td><td>${m.reported?m.files:'—'}</td><td>${m.reported?(m.days||0):'—'}</td><td>${m.reported?msgsDay:'—'}</td><td>${dHtml}</td></tr>`;
  }).join('');
}

function rowClick(row){const m=MEM[row.dataset.name];if(m)openDrawer(m)}
function sortBy(col){S.dir=S.col===col?S.dir*-1:1;S.col=col;if(S.data)renderTable(S.data.members)}
function onSearch(v){S.q=v;if(S.data)renderTable(S.data.members)}
function switchGroup(g){S.group=g==='all'?null:g;load()}
function switchPeriodType(t){S.periodType=t;S.period=null;load()}

function openTeamReport(){
  var period=S.data?.current_period;
  if(!period) return;
  document.getElementById('drawer-avatar').textContent='📊';
  document.getElementById('drawer-title').textContent=t('team_report')+period;
  document.getElementById('drawer-sub').textContent='Team Report';
  var frame=document.getElementById('drawer-frame');
  frame.style.display='none';frame.src='';
  document.getElementById('drawer-loading').style.display='flex';
  var url='/api/report?kind=team&period='+encodeURIComponent(period);
  setTimeout(function(){frame.src=url},50);
  document.getElementById('overlay').classList.add('vis');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow='hidden';
}

async function doRefresh(){
  const b=document.getElementById('refresh-btn');
  const lbl=document.getElementById('refresh-lbl');
  b.disabled=true;lbl.textContent=t('syncing');
  try{
    const r=await fetch('/api/refresh',{method:'POST'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    await load();
    lbl.textContent=t('sync_done');
    setTimeout(()=>{lbl.textContent=t('refresh');b.disabled=false},1800);
  }catch(e){
    lbl.textContent=t('failed');
    showErr(t('refresh_failed')+e.message);
    setTimeout(()=>{lbl.textContent=t('refresh');b.disabled=false},2000);
  }
}

// ── Report Drawer ──────────────────────────────────
function openDrawer(m){
  var period=S.data?.current_period||'';
  document.getElementById('drawer-avatar').textContent=(m.display||'?').charAt(0).toUpperCase();
  document.getElementById('drawer-title').textContent=m.display;
  document.getElementById('drawer-sub').textContent=`${(m.group||'').toUpperCase()} · ${period} · ${m.messages.toLocaleString()}${t('msg_count')} · ${m.lines_added.toLocaleString()}${t('line_count')}`;
  var frame=document.getElementById('drawer-frame');
  frame.style.display='none';
  document.getElementById('drawer-loading').style.display='flex';
  frame.src='/api/report?name='+encodeURIComponent(m.name)+'&period='+encodeURIComponent(period)+'&group='+encodeURIComponent(m.group);
  document.getElementById('overlay').classList.add('vis');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function onFrameLoad(){
  const f=document.getElementById('drawer-frame');
  if(!f.src||f.src===location.href) return;
  document.getElementById('drawer-loading').style.display='none';
  f.style.display='block';
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('vis');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow='';
  setTimeout(()=>{document.getElementById('drawer-frame').src=''},300);
}

function openReportNewTab(){
  const frame=document.getElementById('drawer-frame');
  if(frame.src&&frame.src!==location.href) window.open(frame.src,'_blank');
}

// ── Report translation ─────────────────────────────────────────────────────────
const TRANS_EN2CN={
  'Messages':'rpt_messages','Lines':'rpt_lines','Files':'rpt_files','Days':'rpt_days','Msgs/Day':'rpt_msgs_day',
  'What You Work On':'rpt_work_on','How You Use Claude Code':'rpt_usage',
  'Impressive Things You Did':'rpt_highlights','At a Glance':'rpt_glance',
  'Claude Code Insights':'rpt_insights','AI Code Insights':'rpt_insights',
  'Sessions':'rpt_sessions','Top':'rpt_top','Activity':'rpt_activity',
};
const TRANS_CN2EN=Object.fromEntries(Object.entries(TRANS_EN2CN).map(([k,v])=>[v,k]));
let _reportLangCN=false;

function toggleReportLang(){
  const frame=document.getElementById('drawer-frame');
  const btn=document.getElementById('drawer-lang-btn');
  try{
    const doc=frame.contentDocument;
    if(!doc||!doc.body) return;
    const map=_reportLangCN?TRANS_CN2EN:TRANS_EN2CN;
    const walker=doc.createTreeWalker(doc.body,NodeFilter.SHOW_TEXT,null,false);
    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node=>{
      let v=node.nodeValue;
      Object.entries(map).forEach(([a,bKey])=>{
        const b=_reportLangCN?DICT.en[bKey]||a:DICT.zh[bKey]||a;
        v=v.replaceAll(a,b);
      });
      node.nodeValue=v;
    });
    _reportLangCN=!_reportLangCN;
    btn.textContent=_reportLangCN?'EN':t('lang_btn');
  }catch(e){console.warn('translate',e)}
}

// ── AI Chat ────────────────────────────────────────
function toggleChat(){
  S.chatOpen=!S.chatOpen;
  document.getElementById('ai-fab').classList.toggle('open',S.chatOpen);
  document.getElementById('ai-panel').classList.toggle('open',S.chatOpen);
  document.getElementById('ai-badge').classList.remove('on');
  if(S.chatOpen && !S.summaryLoaded) loadSummary();
}

function addMsg(role,text,id){
  const msgs=document.getElementById('ai-msgs');
  const isUser=role==='user';
  const div=document.createElement('div');
  div.className='msg'+(isUser?' user':'');
  if(id) div.id=id;
  div.innerHTML=`
    <div class="msg-avatar">${isUser?'U':'✦'}</div>
    <div class="msg-bubble${text===null?' typing':''}">${
      text===null
        ?'<div class="typing-dots"><span></span><span></span><span></span></div>'
        :escHtml(text)
    }</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function loadSummary(){
  if(!S.data) return;
  const msgs=document.getElementById('ai-msgs');
  msgs.innerHTML='';
  const card=document.createElement('div');
  card.className='ai-summary-card';
  const summaryText=S.cachedSummary||t('generating_summary_short');
  card.innerHTML=`<div class="ai-summary-label">${t('weekly_data_summary')}</div><div id="summary-text">${escHtml(summaryText)}</div>`;
  msgs.appendChild(card);
  const hint=document.createElement('div');
  hint.style.cssText='font-size:11px;color:var(--text3);text-align:center;padding:4px 0';
  hint.textContent=t('can_continue_asking');
  msgs.appendChild(hint);
  msgs.scrollTop=msgs.scrollHeight;
}

async function sendChat(){
  const inp=document.getElementById('ai-input');
  const q=inp.value.trim();
  if(!q||!S.data) return;
  inp.value='';
  document.getElementById('ai-send').disabled=true;

  addMsg('user',q);
  const botDiv=addMsg('bot',null,'bot-typing');

  try{
    const r=await fetch('/api/ai/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q,lang:S.lang,context:{group:S.group,period:S.data.current_period,periodType:S.periodType,totals:S.data.totals,members:(S.data.members||[]).slice(0,20)}}),
    });
    const bubble=botDiv.querySelector('.msg-bubble');
    bubble.classList.remove('typing');
    bubble.innerHTML='';
    let txt='';
    const reader=r.body.getReader(),dec=new TextDecoder();
    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      dec.decode(value).split('\n').forEach(line=>{
        if(line.startsWith('data: ')){
          try{
            const chunk=JSON.parse(line.slice(6));
            txt+=chunk;
            bubble.textContent=txt;
          }catch{}
        }
      });
      document.getElementById('ai-msgs').scrollTop=9999;
    }
  }catch(e){
    const b=document.getElementById('bot-typing')?.querySelector('.msg-bubble');
    if(b){b.classList.remove('typing');b.textContent=t('error_retry')}
  }finally{
    document.getElementById('ai-send').disabled=false;
    inp.focus();
  }
}

function showErr(m){const e=document.getElementById('err-bar');e.textContent='⚠ '+m;e.classList.add('on')}
function hideErr(){document.getElementById('err-bar').classList.remove('on')}

// ── Init ───────────────────────────────────────────
load();
</script>
