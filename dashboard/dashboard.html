<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Report Dashboard</title>
<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--surface:#1e293b;--surface2:#293548;
  --border:#334155;--border2:#475569;
  --accent:#3b82f6;--accent-glow:rgba(59,130,246,.3);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --success:#22c55e;--warn:#f59e0b;--err:#ef4444;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;min-height:100vh}

/* ── NAV ── */
.nav{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;height:52px;position:sticky;top:0;z-index:100}
.nav-logo{font-weight:900;font-size:16px;letter-spacing:2.5px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:28px;white-space:nowrap}
.nav-tabs{display:flex;align-items:stretch;margin-right:auto;gap:2px}
.nav-tab{background:transparent;border:none;padding:0 14px;height:52px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-period-type{display:flex;align-items:center;gap:4px;margin-right:10px;flex-shrink:0}
.nav-pt-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-pt-btn:hover{color:var(--text2);border-color:var(--text2)}
.nav-pt-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(59,130,246,.12)}
.nav-right{display:flex;align-items:center;gap:8px}
/* ── WEEK DROPDOWN ── */
.wk-drop{position:relative;display:inline-block}
.wk-btn{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.4);border-radius:7px;padding:7px 28px 7px 10px;font-size:12px;color:var(--text);cursor:pointer;user-select:none;white-space:nowrap;position:relative;animation:pulse-nav 2.4s ease-in-out infinite}
.wk-btn::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);transition:transform .2s}
.wk-drop.open .wk-btn::after{transform:translateY(-50%) rotate(180deg)}
.wk-btn:hover{border-color:var(--accent);animation:none;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
.wk-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:100%;background:#162a4a;border:1px solid rgba(59,130,246,.5);border-radius:9px;box-shadow:0 8px 28px rgba(0,0,0,.55);z-index:200;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .18s,transform .18s cubic-bezier(.34,1.56,.64,1)}
.wk-drop.open .wk-menu{opacity:1;pointer-events:auto;transform:translateY(0)}
.wk-item{padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;transition:background .12s,color .12s}
.wk-item:hover{background:rgba(59,130,246,.15);color:var(--text)}
.wk-item.active{color:var(--accent);font-weight:600;background:rgba(59,130,246,.1)}
.btn{border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{box-shadow:0 0 0 4px var(--accent-glow)}
.btn-ghost{background:rgba(59,130,246,.08);color:var(--text2);border:1px solid rgba(59,130,246,.4);animation:pulse-nav 2.4s ease-in-out infinite}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);animation:none;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
.btn-ghost.active{color:var(--accent);border-color:var(--accent);background:rgba(59,130,246,.12);animation:none}
@keyframes pulse-nav{0%,100%{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08);box-shadow:0 0 0 0 rgba(59,130,246,.3)}50%{border-color:rgba(59,130,246,.8);background:rgba(59,130,246,.18);box-shadow:0 0 0 3px rgba(59,130,246,0)}}

/* ── STATS ROW ── */
.stats-row{flex-shrink:0;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0;background:rgba(59,130,246,.07);margin:14px 16px 0;border-radius:var(--r);border:1px solid rgba(59,130,246,.25);overflow:hidden}
.stat{background:transparent;padding:18px 20px 14px;border-right:1px solid rgba(59,130,246,.15)}
.stat:last-child{border-right:none}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.stat-lbl{font-size:13px;color:var(--text2);margin-top:7px;font-weight:400;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stat-delta{font-size:12px;font-weight:600}
.up{color:var(--success)}.down{color:var(--err)}.flat{color:var(--text3)}

/* ── AI STRIP ── */
.ai-strip{flex-shrink:0;margin:10px 16px 0;border-radius:var(--r);border:1px solid rgba(59,130,246,.25);background:rgba(59,130,246,.07);padding:12px 16px;display:flex;align-items:flex-start;gap:12px;min-height:44px}
.ai-strip-icon{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-top:2px}
.ai-strip-label{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.3px;margin-bottom:6px}
.ai-strip-text{font-size:14px;color:var(--text2);line-height:1.65;flex:1}

/* ── ERR ── */
.err{flex-shrink:0;background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.25);padding:8px 24px;font-size:12px;color:var(--err);display:none}
.err.on{display:block}

/* ── TABLE ── */
.table-shell{flex:1;overflow:hidden;margin:10px 16px 16px;border-radius:var(--r);border:1px solid rgba(59,130,246,.25);background:rgba(59,130,246,.07);display:flex;flex-direction:column;min-height:0}
.table-toolbar{flex-shrink:0;padding:10px 16px;border-bottom:1px solid rgba(59,130,246,.15);display:flex;align-items:center;gap:10px;background:rgba(59,130,246,.05);border-radius:var(--r) var(--r) 0 0}
.search{background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--text);width:200px;transition:border-color .15s,background .15s}
.search:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.09)}
.search::placeholder{color:var(--text2)}
.tbl-meta{margin-left:auto;font-size:13px;color:var(--text2)}
.tbl-hint{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px}
.hint-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.tbl-scroll{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:5}
thead tr{background:#162040;border-bottom:1px solid rgba(59,130,246,.25)}
th{padding:9px 14px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);text-align:right;cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s}
th:first-child{text-align:left}
th:hover{color:var(--text2)}
th.sorted{color:var(--accent)}
td{padding:9px 14px;font-size:14px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text)}
td:first-child{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tr.rpt{cursor:pointer;transition:background .12s}
tr.rpt:hover td{background:rgba(59,130,246,.07)}
tr.rpt:hover td:first-child{color:var(--accent)}
tr.nrpt td{color:var(--text3)}
tr.nrpt td:first-child{color:var(--text2);border-left:2px solid rgba(245,158,11,.5);padding-left:12px}
.rank-num{display:inline-block;width:22px;text-align:right;font-size:11px;color:var(--text3);margin-right:8px}
.badge-miss{font-size:10px;color:var(--warn);background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);border-radius:5px;padding:1px 6px;margin-left:6px}
.click-hint{font-size:10px;color:var(--text3);margin-left:6px;opacity:0;transition:opacity .15s}
tr.rpt:hover .click-hint{opacity:1}
.empty{text-align:center;padding:60px;color:var(--text3)}

/* ── REPORT DRAWER ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.vis{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(820px,92vw);background:var(--surface);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(0,0,0,.4);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.32,0,.08,1)}
.drawer.open{transform:translateX(0)}
.drawer-hd{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg2)}
.drawer-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
.drawer-info{flex:1;min-width:0}
.drawer-title{font-size:15px;font-weight:700;color:var(--text)}
.drawer-sub{font-size:12px;color:var(--text3);margin-top:2px}
.btn-close{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:16px;cursor:pointer;color:var(--text2);transition:background .15s;line-height:1}
.btn-close:hover{background:var(--border)}
.drawer-body{flex:1;display:flex;flex-direction:column;min-height:0}
.drawer-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);font-size:13px}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.drawer-frame{flex:1;border:none;width:100%;display:none}

/* ── AI CHAT WIDGET ── */
.ai-fab{
  position:fixed;bottom:28px;right:28px;z-index:300;
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  box-shadow:0 4px 20px rgba(59,130,246,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:#fff;
  transition:transform .2s,box-shadow .2s;
}
.ai-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(59,130,246,.65)}
.ai-fab-icon{transition:transform .25s}
.ai-fab.open .ai-fab-icon{transform:rotate(90deg)}
.ai-badge{
  position:absolute;top:-2px;right:-2px;
  width:12px;height:12px;border-radius:50%;
  background:var(--accent);border:2px solid var(--bg);
  opacity:0;
}
.ai-badge.on{opacity:1;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.6)}50%{box-shadow:0 0 0 5px rgba(59,130,246,0)}}

.ai-panel{
  position:fixed;bottom:92px;right:28px;z-index:299;
  width:520px;height:600px;
  background:rgba(15,23,42,.92);border:1px solid rgba(59,130,246,.25);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  display:flex;flex-direction:column;
  transform:scale(.92) translateY(16px);
  transform-origin:bottom right;
  opacity:0;pointer-events:none;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .18s;
}
.ai-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:auto}

.ai-panel-hd{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:14px 16px;border-bottom:1px solid rgba(59,130,246,.2);
}
.ai-panel-logo{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;flex-shrink:0;
}
.ai-panel-title{font-size:13px;font-weight:700;color:var(--text);flex:1}
.ai-panel-sub{font-size:11px;color:var(--success);display:flex;align-items:center;gap:4px}
.ai-online-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0}
.ai-panel-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 4px;border-radius:5px;line-height:1}
.ai-panel-close:hover{background:var(--surface2);color:var(--text)}

.ai-msgs{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  min-height:0;
}
.msg{display:flex;gap:8px;align-items:flex-start;max-width:100%}
.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:700;
}
.msg.user .msg-avatar{background:var(--surface2);color:var(--text3);font-size:13px}
.msg-bubble{
  background:var(--surface2);border-radius:12px 12px 12px 4px;
  padding:9px 12px;font-size:12px;color:var(--text2);
  line-height:1.55;max-width:80%;word-break:break-word;
}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-radius:12px 12px 4px 12px}
.msg-bubble.typing{color:var(--text3)}
.typing-dots{display:inline-flex;gap:3px;align-items:center;padding:2px 0}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite both}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.ai-summary-card{
  background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);
  border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text2);
  line-height:1.6;
}
.ai-summary-label{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

.ai-panel-input{
  flex-shrink:0;padding:12px 14px;border-top:1px solid rgba(59,130,246,.2);
  display:flex;gap:8px;align-items:center;
  background:transparent;border-radius:0 0 16px 16px;
}
.ai-text-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;
  transition:border-color .15s;resize:none;height:34px;line-height:20px;
  font-family:inherit;
}
.ai-text-input:focus{outline:none;border-color:var(--accent)}
.ai-text-input::placeholder{color:var(--text3)}
.ai-send-btn{
  width:34px;height:34px;flex-shrink:0;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.ai-send-btn:hover{background:#2563eb}
.ai-send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── SHIMMER ── */
@keyframes sh{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:800px 100%;animation:sh 1.5s infinite;border-radius:5px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .nav{padding:0 12px;gap:6px}
  .nav-tabs{gap:0}
  .nav-tab{padding:0 10px;font-size:12px}
  .nav-right{gap:6px}
  .wk-btn{font-size:11px;padding:4px 22px 4px 8px;max-width:90px}
  .btn{padding:5px 10px;font-size:11px}
  .stats-row{grid-template-columns:repeat(3,1fr);margin:10px 10px 0}
  .stats-row .stat:nth-child(4),.stats-row .stat:nth-child(5){border-top:1px solid rgba(59,130,246,.15)}
  .stats-row .stat:nth-child(4){border-right:1px solid rgba(59,130,246,.15)}
  .stat{padding:12px 14px 10px}
  .stat-val{font-size:22px}
  .ai-strip{margin:8px 10px 0;padding:10px 12px}
  .table-shell{margin:8px 10px 10px}
  .table-toolbar{flex-wrap:wrap;gap:6px;padding:8px 10px}
  .search{width:100%}
  .tbl-meta{margin-left:0;width:100%}
  .ai-panel{width:calc(100vw - 20px);right:10px;bottom:80px}
  .ai-fab{bottom:16px;right:16px}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stats-row .stat:nth-child(5){grid-column:span 2;border-top:1px solid rgba(59,130,246,.15)}
  .nav-logo{font-size:12px;margin-right:12px}
  .nav-tabs{display:none}
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">CC REPORT</div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="nav-right">
    <div class="nav-period-type" id="nav-period-type"></div>
    <div class="wk-drop" id="wk-drop">
      <div class="wk-btn" id="wk-btn" onclick="toggleWeekDrop()">—</div>
      <div class="wk-menu" id="wk-menu"></div>
    </div>
    <button class="btn btn-ghost" id="btn-team" onclick="openTeamReport()" style="display:none">&#128202; 团队</button>
    <button class="btn btn-ghost" id="refresh-btn" onclick="doRefresh()">&#8634; <span id="refresh-lbl">刷新</span></button>
    <button class="btn btn-ghost" id="btn-lang" onclick="toggleLang()">EN</button>
  </div>
</nav>

<!-- Stats -->
<div class="stats-row" id="stats-row">
  <div class="stat"><div class="skel" style="height:24px;width:80px"></div><div class="skel" style="height:10px;width:50px;margin-top:8px"></div></div>
  <div class="stat"><div class="skel" style="height:24px;width:80px"></div><div class="skel" style="height:10px;width:50px;margin-top:8px"></div></div>
  <div class="stat"><div class="skel" style="height:24px;width:80px"></div><div class="skel" style="height:10px;width:50px;margin-top:8px"></div></div>
  <div class="stat"><div class="skel" style="height:24px;width:80px"></div><div class="skel" style="height:10px;width:50px;margin-top:8px"></div></div>
  <div class="stat"><div class="skel" style="height:24px;width:80px"></div><div class="skel" style="height:10px;width:50px;margin-top:8px"></div></div>
</div>

<!-- Error -->
<div class="err" id="err-bar"></div>

<!-- AI Summary Strip -->
<div class="ai-strip" id="ai-strip" style="display:none">
  <div class="ai-strip-icon">✦</div>
  <div style="flex:1;min-width:0">
    <div class="ai-strip-label">AI 周报摘要</div>
    <div class="ai-strip-text" id="ai-strip-text"><span class="skel" style="display:inline-block;width:60%;height:12px"></span></div>
  </div>
</div>

<!-- Table -->
<div class="table-shell">
  <div class="table-toolbar">
    <input class="search" id="search" type="text" placeholder="搜索成员…" oninput="onSearch(this.value)">
    <div class="tbl-hint"><div class="hint-dot"></div>点击成员查看完整报告</div>
    <div class="tbl-meta" id="tbl-meta"></div>
  </div>
  <div class="tbl-scroll">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('display')" id="th-display"><span data-i18n="col_member">成员</span><span id="si-display"></span></th>
          <th onclick="sortBy('messages')" id="th-messages"><span data-i18n="col_msg">对话数</span><span id="si-messages"> ▼</span></th>
          <th onclick="sortBy('lines_added')" id="th-lines_added"><span data-i18n="col_lines">新增行</span><span id="si-lines_added"></span></th>
          <th onclick="sortBy('files')" id="th-files"><span data-i18n="col_files">文件数</span><span id="si-files"></span></th>
          <th onclick="sortBy('days')" id="th-days"><span data-i18n="col_days">活跃天</span><span id="si-days"></span></th>
          <th onclick="sortBy('msgs_day')" id="th-msgs_day"><span data-i18n="col_msgs_day">日均对话</span><span id="si-msgs_day"></span></th>
          <th onclick="sortBy('delta_messages')" id="th-delta_messages"><span data-i18n="col_delta">周变化</span><span id="si-delta_messages"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Report Drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hd">
    <div class="drawer-avatar" id="drawer-avatar"></div>
    <div class="drawer-info">
      <div class="drawer-title" id="drawer-title"></div>
      <div class="drawer-sub" id="drawer-sub"></div>
    </div>
    <button class="btn-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-loading" id="drawer-loading"><div class="spin"></div><span>加载报告中…</span></div>
    <iframe class="drawer-frame" id="drawer-frame" onload="onFrameLoad()"></iframe>
  </div>
</div>

<!-- AI Chat Widget -->
<button class="ai-fab" id="ai-fab" onclick="toggleChat()">
  <span class="ai-fab-icon" id="ai-fab-icon">✦</span>
  <div class="ai-badge" id="ai-badge"></div>
</button>

<div class="ai-panel" id="ai-panel">
  <div class="ai-panel-hd">
    <div class="ai-panel-logo">✦</div>
    <div style="flex:1">
      <div class="ai-panel-title">AI 数据助手</div>
      <div class="ai-panel-sub"><div class="ai-online-dot"></div>在线</div>
    </div>
    <button class="ai-panel-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="ai-msgs" id="ai-msgs"></div>
  <div class="ai-panel-input">
    <textarea class="ai-text-input" id="ai-input" placeholder="询问本周数据…"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
    <button class="ai-send-btn" id="ai-send" onclick="sendChat()">↑</button>
  </div>
</div>

<script>
const DICT={
  zh:{col_member:'成员',col_msg:'对话数',col_lines:'新增行',col_files:'文件数',col_days:'活跃天',col_msgs_day:'日均对话',col_cost:'费用',col_delta:'周变化',all:'全部',no_report:'未提交',no_data:'本周暂无数据'},
  en:{col_member:'Member',col_msg:'Messages',col_lines:'Lines',col_files:'Files',col_days:'Active Days',col_msgs_day:'Msgs/Day',col_cost:'Cost',col_delta:'Change',all:'All',no_report:'No report',no_data:'No data'},
};
const S={group:null,period:null,periodType:'weekly',lang:'zh',col:'messages',dir:1,q:'',data:null,chatOpen:false,summaryLoaded:false,cachedSummary:null,reportLang:'en'};
const MEM={};
const t=k=>(DICT[S.lang]||DICT.zh)[k]||k;

function setLang(l){
  S.lang=l;
  document.getElementById('btn-lang').textContent=l==='zh'?'EN':'中';
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  if(S.data) renderTable(S.data.members);
}
function toggleLang(){setLang(S.lang==='zh'?'en':'zh')}
function switchPeriodType(t){S.periodType=t;S.period=null;load()}

// ── Data ───────────────────────────────────────────
async function load(){
  const p=new URLSearchParams();
  if(S.group) p.set('group',S.group);
  if(S.period) p.set('period',S.period);
  p.set('period_type',S.periodType);
  try{
    const r=await fetch('/api/data?'+p);
    if(!r.ok) throw new Error('HTTP '+r.status);
    S.data=await r.json();
    S.summaryLoaded=false;
    hideErr();render(S.data);
  }catch(e){showErr(e.message)}
}

function render(d){
  renderTabs(d);renderPeriods(d);renderStats(d);renderTable(d.members);
  if(d.last_updated){
    const diff=Math.floor((Date.now()-new Date(d.last_updated))/1000);
    const rel=diff<60?'刚刚':diff<3600?Math.floor(diff/60)+'分钟前':diff<86400?Math.floor(diff/3600)+'小时前':new Date(d.last_updated).toLocaleDateString('zh',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('tbl-meta').textContent='更新于 '+rel;
  }
  renderAiStrip(d);
}

async function renderAiStrip(d){
  const strip=document.getElementById('ai-strip');
  const txt=document.getElementById('ai-strip-text');
  strip.style.display='flex';
  txt.textContent='正在生成摘要，请稍候…';
  S.summaryLoaded=false;
  try{
    const r=await fetch('/api/ai/summary',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({group:S.group||'',week:d.current_week||'',lang:S.lang}),
    });
    const j=await r.json();
    if(j.error){
      txt.textContent=j.error;
    }else{
      S.cachedSummary=j.summary.replace(/^#+\s*/,'');
      S.summaryLoaded=true;
      txt.textContent=S.cachedSummary;
      if(!S.chatOpen) document.getElementById('ai-badge').classList.add('on');
    }
  }catch(e){
    txt.textContent='AI 摘要请求失败：' + (e&&e.message||'网络错误');
  }
}

function renderTabs(d){
  document.getElementById('nav-tabs').innerHTML=['all',...(d.groups||[])].map(g=>
    `<button class="nav-tab${(S.group||'all')===g?' active':''}" onclick="switchGroup('${g}')">${g==='all'?t('all'):g.toUpperCase()}</button>`
  ).join('');
  var types=d.period_types||['weekly'];
  var labels={weekly:'周',monthly:'月',quarterly:'季',annual:'年'};
  document.getElementById('nav-period-type').innerHTML=types.map(function(t){
    return '<button class="nav-pt-btn'+(S.periodType===t?' active':'')+'" onclick="switchPeriodType(\''+t+'\')">'+(labels[t]||t)+'</button>';
  }).join('');
  document.getElementById('btn-team').style.display=d.has_team_report?'inline-block':'none';
}

function renderPeriods(d){
  var cur=d.current_period||'';
  document.getElementById('wk-btn').textContent=cur||'—';
  document.getElementById('wk-menu').innerHTML=[...(d.periods||[])].reverse().map(function(p){
    return '<div class="wk-item'+(p===cur?' active':'')+'" onclick="pickPeriod(\''+p+'\')">'+p+'</div>';
  }).join('');
}
function toggleWeekDrop(){
  document.getElementById('wk-drop').classList.toggle('open');
}
function pickPeriod(p){
  document.getElementById('wk-drop').classList.remove('open');
  S.period=p;load();
}
document.addEventListener('click',e=>{
  const drop=document.getElementById('wk-drop');
  if(drop&&!drop.contains(e.target)) drop.classList.remove('open');
});

function renderStats(d){
  const T=d.totals||{};
  const cpct=T.coverage_pct||0;
  const ccol=cpct>=80?'var(--success)':cpct>=50?'var(--warn)':'var(--err)';
  function pctSpan(delta,current){
    if(delta==null) return '';
    const prev=current-delta;
    if(!prev) return '';
    const p=Math.round(delta/prev*100);
    return p>0?`<span class="stat-delta up">↑ ${p}%</span>`
          :p<0?`<span class="stat-delta down">↓ ${Math.abs(p)}%</span>`
          :'';
  }
  const costVal=T.cost>0?`$${T.cost.toFixed(1)}`:null;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-val">${(T.messages||0).toLocaleString()}</div><div class="stat-lbl">对话数 ${pctSpan(T.delta_messages,T.messages)}</div></div>
    <div class="stat"><div class="stat-val">${(T.lines_added||0).toLocaleString()}</div><div class="stat-lbl">新增代码行 ${pctSpan(T.delta_lines_added,T.lines_added)}</div></div>
    <div class="stat"><div class="stat-val" style="color:${ccol}">${cpct}%</div><div class="stat-lbl">提交覆盖率 <span style="color:var(--text3);font-weight:400">${T.reported||0}/${T.expected||0}人</span></div></div>
    <div class="stat"><div class="stat-val">${(T.files||0).toLocaleString()}</div><div class="stat-lbl">涉及文件 ${pctSpan(T.delta_files,T.files)}</div></div>
    ${costVal!=null?`<div class="stat"><div class="stat-val">${costVal}</div><div class="stat-lbl">本周费用</div></div>`:''}`;
}

// ── Table ──────────────────────────────────────────
function renderTable(members){
  if(!members) return;
  members.forEach(m=>MEM[m.name]=m);
  const q=S.q.toLowerCase();
  let rows=q?members.filter(m=>m.display.toLowerCase().includes(q)||m.name.toLowerCase().includes(q)):members;
  const rpt=[...rows.filter(m=>m.reported)];
  const nrpt=[...rows.filter(m=>!m.reported)];
  const{col,dir}=S;
  rpt.sort((a,b)=>{const av=a[col]??-Infinity,bv=b[col]??-Infinity;return typeof av==='string'?dir*av.localeCompare(bv):dir*(bv-av)});
  nrpt.sort((a,b)=>a.display.localeCompare(b.display));
  rows=[...rpt,...nrpt];
  document.querySelectorAll('[id^="si-"]').forEach(el=>el.textContent='');
  document.querySelectorAll('th').forEach(el=>el.classList.remove('sorted'));
  const si=document.getElementById('si-'+col),th=document.getElementById('th-'+col);
  if(si) si.textContent=dir===1?' ▼':' ▲';
  if(th) th.classList.add('sorted');
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="7" class="empty">${t('no_data')}</td></tr>`;return}
  let rank=0;
  tbody.innerHTML=rows.map(m=>{
    rank++;
    const d=m.delta_messages;
    const dHtml=!m.reported
      ?'—'
      :d==null?'—':d>0?`<span class="up">+${d.toLocaleString()}</span>`:d<0?`<span class="down">${d.toLocaleString()}</span>`:'—';
    const rowAttr=m.reported?`class="rpt" data-name="${m.name}" onclick="rowClick(this)"` :`class="nrpt"`;
    const rankSpan=`<span class="rank-num" style="${m.reported?'':'color:var(--text3);opacity:.5'}">${rank}</span>`;
    const nameCell=m.reported
      ?`${rankSpan}${m.display}<span class="click-hint">↗ 查看报告</span>`
      :`${rankSpan}${m.display}<span class="badge-miss">${t('no_report')}</span>`;
    const msgsDay=Number(m.msgs_day||0).toLocaleString(undefined,{maximumFractionDigits:1});
    return `<tr ${rowAttr}><td>${nameCell}</td><td>${m.reported?m.messages.toLocaleString():'—'}</td><td>${m.reported?m.lines_added.toLocaleString():'—'}</td><td>${m.reported?m.files:'—'}</td><td>${m.reported?(m.days||0):'—'}</td><td>${m.reported?msgsDay:'—'}</td><td>${dHtml}</td></tr>`;
  }).join('');
}

function rowClick(row){const m=MEM[row.dataset.name];if(m)openDrawer(m)}
function sortBy(col){S.dir=S.col===col?S.dir*-1:1;S.col=col;if(S.data)renderTable(S.data.members)}
function onSearch(v){S.q=v;if(S.data)renderTable(S.data.members)}
function switchGroup(g){S.group=g==='all'?null:g;load()}
function switchPeriodType(t){S.periodType=t;S.period=null;load()}

function openTeamReport(){
  var period=S.data?.current_period;
  if(!period) return;
  document.getElementById('drawer-avatar').textContent='📊';
  document.getElementById('drawer-title').textContent='团队报告 · '+period;
  document.getElementById('drawer-sub').textContent='Claude Code Team Report';
  var frame=document.getElementById('drawer-frame');
  frame.style.display='none';frame.src='';
  document.getElementById('drawer-loading').style.display='flex';
  var url='/api/report?kind=team&period='+encodeURIComponent(period);
  setTimeout(function(){frame.src=url},50);
  document.getElementById('overlay').classList.add('vis');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow='hidden';
}

async function doRefresh(){
  const b=document.getElementById('refresh-btn');
  const lbl=document.getElementById('refresh-lbl');
  b.disabled=true;lbl.textContent='同步中';
  try{
    const r=await fetch('/api/refresh',{method:'POST'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    await load();
    lbl.textContent='✓ 完成';
    setTimeout(()=>{lbl.textContent='刷新';b.disabled=false},1800);
  }catch(e){
    lbl.textContent='失败';
    showErr('刷新失败: '+e.message);
    setTimeout(()=>{lbl.textContent='刷新';b.disabled=false},2000);
  }
}

// ── Report Drawer ──────────────────────────────────
function openDrawer(m){
  var period=S.data?.current_period||'';
  document.getElementById('drawer-avatar').textContent=(m.display||'?').charAt(0).toUpperCase();
  document.getElementById('drawer-title').textContent=m.display;
  document.getElementById('drawer-sub').textContent=`${(m.group||'').toUpperCase()} · ${period} · ${m.messages.toLocaleString()} 条对话 · ${m.lines_added.toLocaleString()} 行`;
  var frame=document.getElementById('drawer-frame');
  frame.style.display='none';
  document.getElementById('drawer-loading').style.display='flex';
  frame.src='/api/report?name='+encodeURIComponent(m.name)+'&period='+encodeURIComponent(period)+'&group='+encodeURIComponent(m.group);
  document.getElementById('overlay').classList.add('vis');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function onFrameLoad(){
  const f=document.getElementById('drawer-frame');
  if(!f.src||f.src===location.href) return;
  document.getElementById('drawer-loading').style.display='none';
  f.style.display='block';
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('vis');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow='';
  setTimeout(()=>{document.getElementById('drawer-frame').src=''},300);
}

function openReportNewTab(){
  const frame=document.getElementById('drawer-frame');
  if(frame.src&&frame.src!==location.href) window.open(frame.src,'_blank');
}

// ── Report translation ─────────────────────────────────────────────────────────
const TRANS_EN2CN={
  'Messages':'对话数','Lines':'代码行','Files':'文件数','Days':'活跃天','Msgs/Day':'日均对话',
  'What You Work On':'工作内容分布','How You Use Claude Code':'使用方式分析',
  'Impressive Things You Did':'亮点成就','At a Glance':'数据一览',
  'Claude Code Insights':'Claude Code 数据报告',
  'Sessions':'会话数','Top':'主要','Activity':'活动',
};
const TRANS_CN2EN=Object.fromEntries(Object.entries(TRANS_EN2CN).map(([k,v])=>[v,k]));
let _reportLangCN=false;

function toggleReportLang(){
  const frame=document.getElementById('drawer-frame');
  const btn=document.getElementById('drawer-lang-btn');
  try{
    const doc=frame.contentDocument;
    if(!doc||!doc.body) return;
    const map=_reportLangCN?TRANS_CN2EN:TRANS_EN2CN;
    const walker=doc.createTreeWalker(doc.body,NodeFilter.SHOW_TEXT,null,false);
    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node=>{
      let t=node.nodeValue;
      Object.entries(map).forEach(([a,b])=>{t=t.replaceAll(a,b)});
      node.nodeValue=t;
    });
    _reportLangCN=!_reportLangCN;
    btn.textContent=_reportLangCN?'EN':'中文';
  }catch(e){console.warn('translate',e)}
}

// ── AI Chat ────────────────────────────────────────
function toggleChat(){
  S.chatOpen=!S.chatOpen;
  document.getElementById('ai-fab').classList.toggle('open',S.chatOpen);
  document.getElementById('ai-panel').classList.toggle('open',S.chatOpen);
  document.getElementById('ai-badge').classList.remove('on');
  if(S.chatOpen && !S.summaryLoaded) loadSummary();
}

function addMsg(role,text,id){
  const msgs=document.getElementById('ai-msgs');
  const isUser=role==='user';
  const div=document.createElement('div');
  div.className='msg'+(isUser?' user':'');
  if(id) div.id=id;
  div.innerHTML=`
    <div class="msg-avatar">${isUser?'U':'✦'}</div>
    <div class="msg-bubble${text===null?' typing':''}">${
      text===null
        ?'<div class="typing-dots"><span></span><span></span><span></span></div>'
        :escHtml(text)
    }</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function loadSummary(){
  if(!S.data) return;
  const msgs=document.getElementById('ai-msgs');
  msgs.innerHTML='';
  const card=document.createElement('div');
  card.className='ai-summary-card';
  const summaryText=S.cachedSummary||'正在生成摘要…';
  card.innerHTML=`<div class="ai-summary-label">本周数据摘要</div><div id="summary-text">${escHtml(summaryText)}</div>`;
  msgs.appendChild(card);
  const hint=document.createElement('div');
  hint.style.cssText='font-size:11px;color:var(--text3);text-align:center;padding:4px 0';
  hint.textContent='可以继续提问 👇';
  msgs.appendChild(hint);
  msgs.scrollTop=msgs.scrollHeight;
}

async function sendChat(){
  const inp=document.getElementById('ai-input');
  const q=inp.value.trim();
  if(!q||!S.data) return;
  inp.value='';
  document.getElementById('ai-send').disabled=true;

  addMsg('user',q);
  const botDiv=addMsg('bot',null,'bot-typing');

  try{
    const r=await fetch('/api/ai/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q,context:{group:S.group,period:S.data.current_period,periodType:S.periodType,totals:S.data.totals,members:(S.data.members||[]).slice(0,20)}}),
    });
    const bubble=botDiv.querySelector('.msg-bubble');
    bubble.classList.remove('typing');
    bubble.innerHTML='';
    let txt='';
    const reader=r.body.getReader(),dec=new TextDecoder();
    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      dec.decode(value).split('\n').forEach(line=>{
        if(line.startsWith('data: ')){
          try{
            const chunk=JSON.parse(line.slice(6));
            txt+=chunk;
            bubble.textContent=txt;
          }catch{}
        }
      });
      document.getElementById('ai-msgs').scrollTop=9999;
    }
  }catch(e){
    const b=document.getElementById('bot-typing')?.querySelector('.msg-bubble');
    if(b){b.classList.remove('typing');b.textContent='[出错了，请重试]'}
  }finally{
    document.getElementById('ai-send').disabled=false;
    inp.focus();
  }
}

function showErr(m){const e=document.getElementById('err-bar');e.textContent='⚠ '+m;e.classList.add('on')}
function hideErr(){document.getElementById('err-bar').classList.remove('on')}

// ── Init ───────────────────────────────────────────
// lang button init: shows the language you can switch TO
load();
</script>
</body>
</html>
